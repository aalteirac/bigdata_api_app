definition_version: 2
entities:
  bigdata_app_pkg:
    type: application package
    stage: app.stage
    manifest: app/manifest.yml
    artifacts:
      - src: app/*
        dest: ./
    meta:
      role: ACCOUNTADMIN
      warehouse: DEMO_WH
  bigdata_app:
    type: application
    identifier:
      name: bigdata_app
    from:
      target: bigdata_app_pkg
    meta:
      role: ACCOUNTADMIN
      warehouse: DEMO_WH
